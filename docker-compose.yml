services:
  postgres:
    image: postgres:16-alpine
    container_name: ovgs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovgs
      POSTGRES_PASSWORD: ovgs
      POSTGRES_DB: ovgs
    ports:
      - "15432:5432"
    volumes:
      - ovgs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovgs -d ovgs"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ovgs_postgres_data:
